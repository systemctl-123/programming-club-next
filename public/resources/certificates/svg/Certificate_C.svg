<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img">
  <title>Certificate – Course</title>
  <desc>By Statistics Programming Club</desc>
  <defs>
    <style>
      .t-sans  { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .t-mono  { font-family: 'Courier New', Courier, monospace; }
      .tw      { fill: #e8f0fe; }
      .tb      { fill: #8ab4f8; }
      .tdim    { fill: #3c4a6e; }
      .tgold   { fill: #fdd663; }
      .tmuted  { fill: #5a7099; }
    </style>
  </defs>

  <!-- Deep space background -->
  <rect width="680" height="480" fill="#050b18"/>
  <!-- Vignette suggestion via darker edges -->
  <rect width="680" height="480" fill="#020509" opacity="0.4"/>

  <!-- ═══ NEURAL NETWORK BACKGROUND ART ═══ -->
  <!-- Layer 0 — input nodes, left -->
  <circle cx="52" cy="100" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="140" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="180" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="220" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="260" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="300" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="340" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="52" cy="380" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>

  <!-- Layer 1 — hidden 1 -->
  <circle cx="138" cy="120" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="138" cy="168" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="138" cy="216" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="138" cy="264" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="138" cy="312" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="138" cy="360" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>

  <!-- Layer 2 — hidden 2 (active — glowing) -->
  <circle cx="224" cy="130" r="8" fill="#0d2255" stroke="#5a8fff" stroke-width="1.5"/>
  <circle cx="224" cy="190" r="8" fill="#1a3a80" stroke="#6a9fff" stroke-width="2"/>
  <circle cx="224" cy="250" r="9" fill="#1e4a9a" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="224" cy="310" r="8" fill="#1a3a80" stroke="#6a9fff" stroke-width="2"/>
  <circle cx="224" cy="370" r="8" fill="#0d2255" stroke="#5a8fff" stroke-width="1.5"/>

  <!-- Layer 3 — hidden 3 (active) -->
  <circle cx="310" cy="110" r="7" fill="#0d2255" stroke="#4a7fee" stroke-width="1.5"/>
  <circle cx="310" cy="170" r="9" fill="#2040a0" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="310" cy="240" r="10" fill="#2550b8" stroke="#aac8ff" stroke-width="3" opacity="0.9"/>
  <circle cx="310" cy="310" r="9" fill="#2040a0" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="310" cy="370" r="7" fill="#0d2255" stroke="#4a7fee" stroke-width="1.5"/>

  <!-- Layer right side — mirror -->
  <circle cx="628" cy="100" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="140" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="180" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="220" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="260" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="300" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="340" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>
  <circle cx="628" cy="380" r="6" fill="#1a2a4a" stroke="#2a5080" stroke-width="1"/>

  <circle cx="542" cy="120" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="542" cy="168" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="542" cy="216" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="542" cy="264" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="542" cy="312" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>
  <circle cx="542" cy="360" r="7" fill="#112244" stroke="#3a6aaa" stroke-width="1.2"/>

  <circle cx="456" cy="130" r="8" fill="#0d2255" stroke="#5a8fff" stroke-width="1.5"/>
  <circle cx="456" cy="190" r="8" fill="#1a3a80" stroke="#6a9fff" stroke-width="2"/>
  <circle cx="456" cy="250" r="9" fill="#1e4a9a" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="456" cy="310" r="8" fill="#1a3a80" stroke="#6a9fff" stroke-width="2"/>
  <circle cx="456" cy="370" r="8" fill="#0d2255" stroke="#5a8fff" stroke-width="1.5"/>

  <circle cx="370" cy="110" r="7" fill="#0d2255" stroke="#4a7fee" stroke-width="1.5"/>
  <circle cx="370" cy="170" r="9" fill="#2040a0" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="370" cy="240" r="10" fill="#2550b8" stroke="#aac8ff" stroke-width="3" opacity="0.9"/>
  <circle cx="370" cy="310" r="9" fill="#2040a0" stroke="#8ab4f8" stroke-width="2.5"/>
  <circle cx="370" cy="370" r="7" fill="#0d2255" stroke="#4a7fee" stroke-width="1.5"/>

  <!-- Synaptic connections — left side, selected active paths -->
  <line x1="58" y1="100" x2="131" y2="120" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="140" x2="131" y2="120" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="180" x2="131" y2="168" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="220" x2="131" y2="216" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="260" x2="131" y2="264" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="300" x2="131" y2="312" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="340" x2="131" y2="360" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="58" y1="380" x2="131" y2="360" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- L1 → L2 active paths -->
  <line x1="145" y1="120" x2="216" y2="190" stroke="#2a5090" stroke-width="0.8" fill="none" opacity="0.7"/>
  <line x1="145" y1="168" x2="216" y2="250" stroke="#3a60b0" stroke-width="1.2" fill="none" opacity="0.8"/>
  <line x1="145" y1="216" x2="216" y2="250" stroke="#4a70c0" stroke-width="1.5" fill="none"/>
  <line x1="145" y1="264" x2="216" y2="250" stroke="#4a70c0" stroke-width="1.5" fill="none"/>
  <line x1="145" y1="312" x2="216" y2="310" stroke="#2a5090" stroke-width="0.8" fill="none" opacity="0.7"/>
  <line x1="145" y1="360" x2="216" y2="310" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- L2 → L3 brightest paths -->
  <line x1="232" y1="250" x2="301" y2="240" stroke="#6a9fff" stroke-width="2" fill="none"/>
  <line x1="232" y1="250" x2="301" y2="170" stroke="#4a7fee" stroke-width="1.2" fill="none" opacity="0.8"/>
  <line x1="232" y1="190" x2="301" y2="240" stroke="#4a7fee" stroke-width="1" fill="none" opacity="0.7"/>
  <line x1="232" y1="310" x2="301" y2="240" stroke="#3a6aee" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Right side mirror connections -->
  <line x1="622" y1="100" x2="549" y2="120" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="622" y1="220" x2="549" y2="216" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="622" y1="260" x2="549" y2="264" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="622" y1="380" x2="549" y2="360" stroke="#1e3a60" stroke-width="0.5" fill="none" opacity="0.6"/>
  <line x1="535" y1="168" x2="464" y2="250" stroke="#3a60b0" stroke-width="1.2" fill="none" opacity="0.8"/>
  <line x1="535" y1="216" x2="464" y2="250" stroke="#4a70c0" stroke-width="1.5" fill="none"/>
  <line x1="535" y1="264" x2="464" y2="250" stroke="#4a70c0" stroke-width="1.5" fill="none"/>
  <line x1="448" y1="250" x2="379" y2="240" stroke="#6a9fff" stroke-width="2" fill="none"/>
  <line x1="448" y1="190" x2="379" y2="240" stroke="#4a7fee" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Centre glow — where L3 left meets L3 right -->
  <circle cx="340" cy="240" r="32" fill="#0d2060" opacity="0.5"/>
  <circle cx="340" cy="240" r="22" fill="#1a3a9a" opacity="0.4"/>
  <circle cx="340" cy="240" r="14" fill="#2550cc" opacity="0.5"/>
  <circle cx="340" cy="240" r="7"  fill="#aac8ff" opacity="0.8"/>
  <line x1="319" y1="240" x2="301" y2="240" stroke="#8ab4f8" stroke-width="2" fill="none"/>
  <line x1="361" y1="240" x2="379" y2="240" stroke="#8ab4f8" stroke-width="2" fill="none"/>

  <!-- ═══ CONTENT AREA — frosted card ═══ -->
  <rect x="100" y="44" width="480" height="392" rx="6" fill="#09152e" opacity="0.92"/>
  <rect x="100" y="44" width="480" height="392" rx="6" fill="none" stroke="#8ab4f8" stroke-width="0.8" opacity="0.4"/>

  <!-- Top indigo rule -->
  <rect x="100" y="44" width="480" height="3" rx="2" fill="#4a7fee"/>

  <!-- Tag -->
  <rect x="240" y="38" width="200" height="18" rx="9" fill="#1a3a80"/>
  <rect x="240" y="38" width="200" height="18" rx="9" fill="none" stroke="#8ab4f8" stroke-width="0.7"/>
  <text x="340" y="51" text-anchor="middle" class="t-mono" font-size="8.5" fill="#8ab4f8" letter-spacing="0.12em">STATISTICS PROGRAMMING CLUB</text>

  <!-- Header -->
  <text x="340" y="92" text-anchor="middle" class="t-sans tw" font-size="9.5" letter-spacing="0.28em" opacity="0.6">CERTIFICATE OF ACHIEVEMENT</text>

  <!-- Big title -->
  <text x="340" y="136" text-anchor="middle" class="t-sans tw" font-size="32" font-weight="700" letter-spacing="0.04em">{{course1}}</text>
  <text x="340" y="168" text-anchor="middle" class="t-sans tb" font-size="32" font-weight="700" letter-spacing="0.04em">{{course2}}</text>

  <!-- Divider glow line -->
  <line x1="180" y1="184" x2="500" y2="184" stroke="#4a7fee" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- Presented to -->
  <text x="340" y="210" text-anchor="middle" class="t-sans tmuted" font-size="10.5" letter-spacing="0.1em">AWARDED TO</text>

  <!-- Recipient -->
  <text x="340" y="248" text-anchor="middle" class="t-sans tw" font-size="28" font-weight="700">{{name}}</text>
  <line x1="200" y1="256" x2="340" y2="256" stroke="#4a7fee" stroke-width="1.2" fill="none"/>
  <line x1="340" y1="256" x2="480" y2="256" stroke="#8ab4f8" stroke-width="1.2" fill="none"/>

  <!-- Body -->
  <text x="340" y="280" text-anchor="middle" class="t-sans tmuted" font-size="10.5">{{reason}}</text>
  <text x="340" y="298" text-anchor="middle" class="t-sans tmuted" font-size="10.5">{{reason2}}</text>

  <!-- Stat row -->
  <rect x="148" y="314" width="90" height="46" rx="4" fill="#0d1e45"/>
  <text x="193" y="334" text-anchor="middle" class="t-mono tb" font-size="9" letter-spacing="0.08em">MODULES</text>
  <text x="193" y="352" text-anchor="middle" class="t-sans tw" font-size="18" font-weight="700">{{modules}}</text>

  <rect x="250" y="314" width="90" height="46" rx="4" fill="#0d1e45"/>
  <text x="295" y="334" text-anchor="middle" class="t-mono tb" font-size="9" letter-spacing="0.08em">HOURS</text>
  <text x="295" y="352" text-anchor="middle" class="t-sans tw" font-size="18" font-weight="700">{{hours}}</text>

  <rect x="352" y="314" width="90" height="46" rx="4" fill="#0d1e45"/>
  <text x="397" y="334" text-anchor="middle" class="t-mono tb" font-size="9" letter-spacing="0.08em">SCORE</text>
  <text x="397" y="352" text-anchor="middle" class="t-sans tgold" font-size="18" font-weight="700">{{score}}</text>

  <rect x="454" y="314" width="90" height="46" rx="4" fill="#0d1e45"/>
  <text x="499" y="334" text-anchor="middle" class="t-mono tb" font-size="9" letter-spacing="0.08em">GRADE</text>
  <text x="499" y="352" text-anchor="middle" class="t-sans" font-size="11" font-weight="700" fill="#5af5a0">{{grade}}</text>

  <!-- Bottom rule -->
  <line x1="120" y1="374" x2="560" y2="374" stroke="#1e3060" stroke-width="0.8" fill="none"/>

  <!-- Sigs -->
  <text x="210" y="394" text-anchor="middle" class="t-sans" font-size="10" font-style="italic" fill="#c8deff">{{person1}}</text>
  <line x1="148" y1="398" x2="272" y2="398" stroke="#2a4a80" stroke-width="0.7" fill="none"/>
  <text x="210" y="409" text-anchor="middle" class="t-mono tmuted" font-size="7.5" letter-spacing="0.09em">{{post1}}</text>

  <text x="470" y="394" text-anchor="middle" class="t-sans" font-size="10" font-style="italic" fill="#c8deff">{{person2}}</text>
  <line x1="408" y1="398" x2="532" y2="398" stroke="#2a4a80" stroke-width="0.7" fill="none"/>
  <text x="470" y="409" text-anchor="middle" class="t-mono tmuted" font-size="7.5" letter-spacing="0.09em">{{post2}}</text>

  <!-- Cert ID -->
  <text x="340" y="426" text-anchor="middle" class="t-mono" font-size="8" fill="#2a4a80" letter-spacing="0.1em">{{id}}  ·  {{date}}  ·  VERIFIED</text>
</svg>
