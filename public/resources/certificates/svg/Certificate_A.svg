<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img">
  <title>Certificate of Achievement</title>
  <desc>By Statistics Programming Club</desc>

  <defs>
    <style>
      .cert-bg    { fill: #fdfaf3; }
      .deco-dot   { fill: #b8913a; }
      .deco-line  { stroke: #b8913a; stroke-width: 0.75; fill: none; }
      .sig-line   { stroke: #9a7c35; stroke-width: 0.75; fill: none; }
      .title-text { font-family: Georgia, 'Times New Roman', serif; fill: #2c1f0e; }
      .sub-text   { font-family: Georgia, 'Times New Roman', serif; fill: #5a3e1b; }
      .name-text  { font-family: Georgia, 'Times New Roman', serif; fill: #1a1208; }
      .body-text  { font-family: Georgia, 'Times New Roman', serif; fill: #3d2e14; }
      .seal-fill  { fill: #fdf4de; stroke: #b8913a; stroke-width: 0.75; }
      .seal-ring  { fill: none; stroke: #b8913a; stroke-width: 1.2; }
    </style>
  </defs>

  <!-- Parchment background -->
  <rect x="0" y="0" width="680" height="480" fill="#fdfaf3"/>
  <rect x="28" y="28" width="624" height="424" fill="#faf5e8" rx="1"/>

  <!-- Borders -->
  <rect x="20" y="20" width="640" height="440" fill="none" stroke="#b8913a" stroke-width="2.5" rx="2"/>
  <rect x="26" y="26" width="628" height="428" fill="none" stroke="#b8913a" stroke-width="0.5"/>
  <rect x="32" y="32" width="616" height="416" fill="none" stroke="#d4a84b" stroke-width="0.75" rx="1"/>

  <!-- Corner triangles -->
  <polygon points="20,20 54,20 20,54" fill="#b8913a" opacity="0.85"/>
  <polygon points="660,20 626,20 660,54" fill="#b8913a" opacity="0.85"/>
  <polygon points="20,460 54,460 20,426" fill="#b8913a" opacity="0.85"/>
  <polygon points="660,460 626,460 660,426" fill="#b8913a" opacity="0.85"/>

  <!-- Corner accent dots -->
  <circle cx="44" cy="44" r="3" class="deco-dot"/>
  <circle cx="636" cy="44" r="3" class="deco-dot"/>
  <circle cx="44" cy="436" r="3" class="deco-dot"/>
  <circle cx="636" cy="436" r="3" class="deco-dot"/>

  <!-- Top deco line -->
  <line x1="100" y1="62" x2="580" y2="62" class="deco-line"/>
  <circle cx="100" cy="62" r="2.5" class="deco-dot"/>
  <circle cx="340" cy="62" r="2.5" class="deco-dot"/>
  <circle cx="580" cy="62" r="2.5" class="deco-dot"/>

  <!-- Bottom deco line -->
  <line x1="100" y1="418" x2="580" y2="418" class="deco-line"/>
  <circle cx="100" cy="418" r="2.5" class="deco-dot"/>
  <circle cx="340" cy="418" r="2.5" class="deco-dot"/>
  <circle cx="580" cy="418" r="2.5" class="deco-dot"/>

  <!-- Left vertical deco -->
  <line x1="62" y1="90" x2="62" y2="390" class="deco-line"/>
  <circle cx="62" cy="90"  r="2" class="deco-dot"/>
  <circle cx="62" cy="240" r="2" class="deco-dot"/>
  <circle cx="62" cy="390" r="2" class="deco-dot"/>

  <!-- Right vertical deco -->
  <line x1="618" y1="90" x2="618" y2="390" class="deco-line"/>
  <circle cx="618" cy="90"  r="2" class="deco-dot"/>
  <circle cx="618" cy="240" r="2" class="deco-dot"/>
  <circle cx="618" cy="390" r="2" class="deco-dot"/>

  <!-- Thin rule above institution name -->
  <line x1="120" y1="96" x2="560" y2="96" stroke="#b8913a" stroke-width="0.5" fill="none"/>

  <!-- Institution -->
  <text x="340" y="90" text-anchor="middle" class="title-text" font-size="10" font-weight="400" letter-spacing="0.18em">STATISTICS PROGRAMMING CLUB</text>

  <!-- CERTIFICATE -->
  <text x="340" y="136" text-anchor="middle" class="title-text" font-size="34" font-weight="700" letter-spacing="0.22em">CERTIFICATE</text>

  <!-- OF ACHIEVEMENT -->
  <text x="340" y="162" text-anchor="middle" class="title-text" font-size="13" font-weight="400" letter-spacing="0.35em">OF ACHIEVEMENT</text>

  <!-- Gold divider with centre diamond -->
  <line x1="180" y1="176" x2="316" y2="176" stroke="#b8913a" stroke-width="0.8" fill="none"/>
  <polygon points="340,170 347,176 340,182 333,176" fill="#b8913a"/>
  <line x1="364" y1="176" x2="500" y2="176" stroke="#b8913a" stroke-width="0.8" fill="none"/>

  <!-- Presented to -->
  <text x="340" y="208" text-anchor="middle" class="sub-text" font-size="11" font-style="italic" letter-spacing="0.08em">This certificate is proudly presented to</text>

  <!-- Recipient name -->
  <text x="340" y="250" text-anchor="middle" class="name-text" font-size="30" font-weight="700" font-style="italic">{{name}}</text>

  <!-- Underline beneath name -->
  <line x1="180" y1="260" x2="500" y2="260" stroke="#b8913a" stroke-width="1.2" fill="none"/>

  <!-- Body copy -->
  <text x="340" y="288" text-anchor="middle" class="body-text" font-size="11.5">{{reason}}</text>
  <text x="340" y="308" text-anchor="middle" class="body-text" font-size="13" font-style="italic" font-weight="700" fill="#2c1f0e">{{course}}</text>
  <text x="340" y="328" text-anchor="middle" class="body-text" font-size="11.5">{{reason2}}.</text>

  <!-- Award date -->
  <text x="340" y="350" text-anchor="middle" class="sub-text" font-size="10" letter-spacing="0.06em">Awarded on {{date}}</text>

  <!-- Dashed divider -->
  <line x1="120" y1="362" x2="560" y2="362" stroke="#b8913a" stroke-width="0.4" fill="none" stroke-dasharray="3,4"/>

  <!-- Left signature -->
  <text x="215" y="386" text-anchor="middle" class="sub-text" font-size="11" font-style="italic">{{person1}}</text>
  <line x1="145" y1="392" x2="285" y2="392" class="sig-line"/>
  <text x="215" y="404" text-anchor="middle" class="sub-text" font-size="9" letter-spacing="0.05em">{{post1}}</text>

  <!-- Right signature -->
  <text x="465" y="386" text-anchor="middle" class="sub-text" font-size="11" font-style="italic">{{person2}}</text>
  <line x1="395" y1="392" x2="535" y2="392" class="sig-line"/>
  <text x="465" y="404" text-anchor="middle" class="sub-text" font-size="9" letter-spacing="0.05em">{{post2}}</text>

  <!-- Centre seal -->
  <!-- <circle cx="340" cy="390" r="26" class="seal-fill"/>
  <circle cx="340" cy="390" r="26" class="seal-ring"/>
  <circle cx="340" cy="390" r="20" fill="none" stroke="#b8913a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <circle cx="340" cy="390" r="12" fill="#b8913a" opacity="0.15"/>
  <polygon points="340,376 342.4,384.2 351,384.2 344.3,389.3 346.7,397.5 340,392.4 333.3,397.5 335.7,389.3 329,384.2 337.6,384.2" fill="#b8913a" opacity="0.9"/>
  <text x="340" y="411" text-anchor="middle" class="sub-text" font-size="6.5" letter-spacing="0.12em" fill="#7a5c20"></text> -->

  <!-- Certificate ID -->
  <text x="340" y="434" text-anchor="middle" class="sub-text" font-size="8.5" letter-spacing="0.08em" fill="#9a7c35">CERT ID: {{id}}</text>
</svg>
